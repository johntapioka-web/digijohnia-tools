  <script type="text/babel">
    const { useRef, useEffect } = React;

    function FadingVideo({ src, className, style }) {
      const videoRef = useRef(null);
      const rafRef = useRef(null);
      const fadingOutRef = useRef(false);

      const FADE_MS = 500;
      const FADE_OUT_LEAD = 0.55;

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        const fadeTo = (target, duration) => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          const start = parseFloat(video.style.opacity) || 0;
          const startTime = performance.now();
          const tick = (now) => {
            const elapsed = now - startTime;
            const t = duration > 0 ? Math.min(elapsed / duration, 1) : 1;
            const value = start + (target - start) * t;
            video.style.opacity = String(value);
            if (t < 1) {
              rafRef.current = requestAnimationFrame(tick);
            } else {
              rafRef.current = null;
            }
          };
          rafRef.current = requestAnimationFrame(tick);
        };

        const onLoadedData = () => {
          video.style.opacity = "0";
          const p = video.play();
          if (p && p.catch) p.catch(() => {});
          fadeTo(1, FADE_MS);
        };

        const onTimeUpdate = () => {
          if (fadingOutRef.current) return;
          const dur = video.duration;
          if (!dur || isNaN(dur)) return;
          const remaining = dur - video.currentTime;
          if (remaining <= FADE_OUT_LEAD && remaining > 0) {
            fadingOutRef.current = true;
            fadeTo(0, FADE_MS);
          }
        };

        const onEnded = () => {
          video.style.opacity = "0";
          setTimeout(() => {
            video.currentTime = 0;
            const p = video.play();
            if (p && p.catch) p.catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1, FADE_MS);
          }, 100);
        };

        video.addEventListener("loadeddata", onLoadedData);
        video.addEventListener("timeupdate", onTimeUpdate);
        video.addEventListener("ended", onEnded);

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener("loadeddata", onLoadedData);
          video.removeEventListener("timeupdate", onTimeUpdate);
          video.removeEventListener("ended", onEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          className={className}
          style={{ ...style, opacity: 0 }}
          autoPlay
          muted
          playsInline
          preload="auto"
          src={src}
        />
      );
    }

    window.FadingVideo = FadingVideo;
  </script>

  <script type="text/babel">
    function BlurText({ text, className }) {
      const ref = React.useRef(null);
      const [inView, setInView] = React.useState(false);
      const motion = window.Motion.motion;

      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                setInView(true);
                observer.unobserve(el);
              }
            });
          },
          { threshold: 0.1 }
        );
        observer.observe(el);
        return () => observer.disconnect();
      }, []);

      const words = text.split(" ");

      return (
        <p
          ref={ref}
          className={className}
          style={{
            display: "flex",
            flexWrap: "wrap",
            justifyContent: "center",
            rowGap: "0.1em",
          }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={
                inView
                  ? {
                      filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                      opacity: [0, 0.5, 1],
                      y: [50, -5, 0],
                    }
                  : {}
              }
              transition={{
                duration: 0.7,
                times: [0, 0.5, 1],
                ease: "easeOut",
                delay: (i * 100) / 1000,
              }}
              style={{ display: "inline-block", marginRight: "0.28em" }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    window.BlurText = BlurText;
  </script>

                      {card.tags.map((tag) => (
                        <span
                          key={tag}
                          className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap"
                        >
                          {tag}
                        </span>
                      ))}
                    </div>
                  </div>

                  <div className="flex-1"></div>

                  <div className="mt-6">
                    <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">
                      {card.title}
                    </h3>
                    <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">
                      {card.body}
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    window.Capabilities = Capabilities;
  </script>

  <!-- ====================== App ====================== -->
  <script type="text/babel">
    function App() {
      const Hero = window.Hero;
      const Capabilities = window.Capabilities;
      return (
        <React.Fragment>
          <Hero />
          <Capabilities />
        </React.Fragment>
      );
    }

    window.App = App;

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
