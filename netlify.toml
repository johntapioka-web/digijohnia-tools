# ── Configuration Netlify — digijohnia.solutions ──────────────────────────────
# Ce fichier pilote le déploiement automatique. NE PAS MODIFIER sauf si DIAS le demande.

[build]
  publish = "."        # Déploie tout le dossier racine du repo

# ── Redirections propres (URLs sans .html) ─────────────────────────────────────
# Chaque nouvel outil est dans son propre dossier /nom-outil/index.html
# → URL finale : digijohnia.solutions/nom-outil  (sans slash ni extension)

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# ── En-têtes de sécurité ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Cache long pour assets statiques ──────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
